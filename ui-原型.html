<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UI原型 - 交互版</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 设备指示器 -->
    <div class="device-indicator">
        <button class="device-btn web active" data-device="web">
            <i class="fas fa-desktop"></i>
        </button>
        <button class="device-btn mobile" data-device="mobile">
            <i class="fas fa-mobile-alt"></i>
        </button>
    </div>

    <div id="login-page" class="page active">
        <div class="login-container">
            <div class="login-box">
                <div class="login-logo">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h1 class="login-title">欢迎登录</h1>
                <p class="login-subtitle">登录您的账户以继续</p>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user"></i>
                            用户名
                        </label>
                        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            密码
                        </label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
                            <button type="button" class="toggle-password" id="toggle-password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember-password">
                            <span class="checkmark"></span>
                            <span>记住密码</span>
                        </label>
                    </div>
                    <button type="submit" class="login-button">
                        <span>登录</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                <p class="error-message" id="error-message"></p>
                <div class="login-footer">
                    <p>还没有账户？<a href="#">立即注册</a></p>
                    <a href="#">忘记密码？</a>
                </div>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="home-container">
            <header class="home-header">
                <div class="header-left">
                    <button class="menu-button" id="menu-button">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2>首页</h2>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <i class="fas fa-user-circle"></i>
                        <span id="username-display">用户</span>
                    </div>
                    <button class="logout-button" id="logout-button">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>退出</span>
                    </button>
                </div>
            </header>

            <!-- 侧边导航栏 -->
            <nav class="side-nav" id="side-nav">
                <div class="side-nav-header">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <span class="side-nav-username" id="side-nav-username">用户</span>
                </div>
                <ul class="side-nav-menu">
                    <li class="active"><a href="#"><i class="fas fa-home"></i>首页</a></li>
                    <li><a href="#"><i class="fas fa-th-large"></i>仪表盘</a></li>
                    <li><a href="#"><i class="fas fa-cog"></i>设置</a></li>
                    <li><a href="#" id="side-nav-logout"><i class="fas fa-sign-out-alt"></i>退出登录</a></li>
                </ul>
                <button class="side-nav-close" id="side-nav-close">
                    <i class="fas fa-times"></i>
                </button>
            </nav>

            <div class="tab-container">
                <div class="tab-buttons">
                    <button class="tab-button active" data-tab="tab1">
                        <i class="fas fa-clipboard-list"></i>
                        <span>项目</span>
                    </button>
                    <button class="tab-button" data-tab="tab2">
                        <i class="fas fa-chart-bar"></i>
                        <span>数据统计</span>
                    </button>
                </div>
                <div class="tab-content">
                    <div class="tab-pane active" id="tab1">
                        <div class="tab-header">
                            <h3>项目</h3>
                            <p class="tab-description">这是项目的内容区域</p>
                        </div>
                        <div class="content-placeholder">
                            <div class="placeholder-card">
                                <div class="placeholder-icon">
                                    <i class="fas fa-inbox"></i>
                                </div>
                                <div class="placeholder-text">
                                    <div class="placeholder-title">项目 1</div>
                                    <div class="placeholder-subtitle">描述文本</div>
                                </div>
                            </div>
                            <div class="placeholder-card">
                                <div class="placeholder-icon">
                                    <i class="fas fa-tasks"></i>
                                </div>
                                <div class="placeholder-text">
                                    <div class="placeholder-title">项目 2</div>
                                    <div class="placeholder-subtitle">描述文本</div>
                                </div>
                            </div>
                            <div class="placeholder-card">
                                <div class="placeholder-icon">
                                    <i class="fas fa-folder"></i>
                                </div>
                                <div class="placeholder-text">
                                    <div class="placeholder-title">项目 3</div>
                                    <div class="placeholder-subtitle">描述文本</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane" id="tab2">
                        <div class="tab-header">
                            <h3>数据统计</h3>
                            <p class="tab-description">这是数据统计的内容区域</p>
                        </div>
                        <div class="content-placeholder">
                            <div class="placeholder-card">
                                <div class="placeholder-icon">
                                    <i class="fas fa-chart-line"></i>
                                </div>
                                <div class="placeholder-text">
                                    <div class="placeholder-title">统计数据 1</div>
                                    <div class="placeholder-subtitle">描述文本</div>
                                </div>
                            </div>
                            <div class="placeholder-card">
                                <div class="placeholder-icon">
                                    <i class="fas fa-chart-pie"></i>
                                </div>
                                <div class="placeholder-text">
                                    <div class="placeholder-title">统计数据 2</div>
                                    <div class="placeholder-subtitle">描述文本</div>
                                </div>
                            </div>
                            <div class="placeholder-card">
                                <div class="placeholder-icon">
                                    <i class="fas fa-database"></i>
                                </div>
                                <div class="placeholder-text">
                                    <div class="placeholder-title">统计数据 3</div>
                                    <div class="placeholder-subtitle">描述文本</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
