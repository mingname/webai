<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #f5f5f5;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #ffffff;
  padding: 20pt 40pt;
}
.header h1 {
  font-size: 28pt;
  margin: 0;
  font-weight: bold;
}
.content {
  padding: 25pt 40pt;
  flex: 1;
}
.prototype-showcase {
  background: #ffffff;
  padding: 20pt;
  border-radius: 12pt;
  box-shadow: 0 4pt 12pt rgba(0,0,0,0.15);
  margin-bottom: 15pt;
}
.prototype-title {
  font-size: 18pt;
  font-weight: bold;
  color: #667eea;
  margin-bottom: 15pt;
}
.features {
  display: flex;
  gap: 20pt;
  flex-wrap: wrap;
}
.feature-item {
  flex: 1;
  min-width: 200pt;
  background: #f8f9fa;
  padding: 15pt;
  border-radius: 8pt;
  border-left: 4pt solid #764ba2;
}
.feature-item h3 {
  font-size: 14pt;
  margin: 0 0 8pt 0;
  color: #333333;
}
.feature-item p {
  font-size: 12pt;
  margin: 0;
  color: #666666;
  line-height: 1.5;
}
.highlight-text {
  color: #667eea;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="header">
  <h1>原型设计成果展示</h1>
</div>
<div class="content">
  <div class="prototype-showcase">
    <p class="prototype-title">📄 交付文件：ui-原型.html</p>
    <div class="features">
      <div class="feature-item">
        <h3>🔐 登录页面</h3>
        <p>用户名/密码输入、记住密码、密码显示切换</p>
      </div>
      <div class="feature-item">
        <h3>🏠 首页展示</h3>
        <p>Tab切换（项目/数据统计）、用户信息展示</p>
      </div>
      <div class="feature-item">
        <h3>📱 响应式设计</h3>
        <p>Web端和移动端双端适配，设备切换预览</p>
      </div>
      <div class="feature-item">
        <h3>🎯 交互功能</h3>
        <p>表单验证、加载状态、错误提示、动画效果</p>
      </div>
    </div>
  </div>
  <p style="font-size: 13pt; color: #666666; margin: 10pt 0;">
    <span class="highlight-text">截图标注：</span>原型文件包含完整的登录和首页交互逻辑，可直接在浏览器中预览
  </p>
</div>
</body>
</html>
