<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #f5f5f5;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #ffffff;
  padding: 20pt 40pt;
}
.header h1 {
  font-size: 28pt;
  margin: 0;
  font-weight: bold;
}
.content {
  padding: 25pt 40pt;
  flex: 1;
}
.summary {
  background: #ffffff;
  padding: 20pt;
  border-radius: 12pt;
  box-shadow: 0 4pt 12pt rgba(0,0,0,0.15);
  margin-bottom: 15pt;
}
.summary-grid {
  display: flex;
  gap: 15pt;
  margin-bottom: 15pt;
}
.summary-item {
  flex: 1;
  background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%);
  padding: 15pt;
  border-radius: 8pt;
  border: 2pt solid #667eea;
  text-align: center;
}
.summary-item .number {
  font-size: 28pt;
  font-weight: bold;
  color: #667eea;
  margin-bottom: 5pt;
}
.summary-item .label {
  font-size: 12pt;
  color: #333333;
}
.timeline {
  background: #f8f9fa;
  padding: 15pt;
  border-radius: 8pt;
  border-left: 4pt solid #764ba2;
}
.timeline h3 {
  font-size: 16pt;
  margin: 0 0 10pt 0;
  color: #764ba2;
}
.timeline ul {
  margin: 0;
  padding-left: 20pt;
  font-size: 13pt;
  color: #333333;
  line-height: 1.6;
}
.timeline li {
  margin-bottom: 5pt;
}
</style>
</head>
<body>
<div class="header">
  <h1>项目成果总结</h1>
</div>
<div class="content">
  <div class="summary">
    <div class="summary-grid">
      <div class="summary-item">
        <div class="number">4</div>
        <div class="label">核心环节</div>
      </div>
      <div class="summary-item">
        <div class="number">2</div>
        <div class="label">平台支持</div>
      </div>
      <div class="summary-item" style="border-color: #764ba2;">
        <div class="number">8+</div>
        <div class="label">核心功能</div>
      </div>
      <div class="summary-item" style="border-color: #764ba2;">
        <div class="number">100%</div>
        <div class="label">代码可用</div>
      </div>
    </div>
    <div class="timeline">
      <h3>📅 开发时间线</h3>
      <ul>
        <li><b>阶段一：</b>需求分析 → 原型设计（1-2天）</li>
        <li><b>阶段二：</b>UI视觉设计规范制定（1天）</li>
        <li><b>阶段三：</b>Web端Vue 3开发（3-5天）</li>
        <li><b>阶段四：</b>Android端Kotlin开发（5-7天）</li>
        <li><b>阶段五：</b>测试联调与优化（2-3天）</li>
      </ul>
    </div>
  </div>
</div>
</body>
</html>
