<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #f5f5f5;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #ffffff;
  padding: 20pt 40pt;
}
.header h1 {
  font-size: 28pt;
  margin: 0;
  font-weight: bold;
}
.content {
  padding: 25pt 40pt;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 15pt;
}
.section-title {
  font-size: 20pt;
  font-weight: bold;
  color: #667eea;
  margin-bottom: 10pt;
}
.step-box {
  background: #ffffff;
  padding: 15pt 20pt;
  border-radius: 8pt;
  box-shadow: 0 2pt 6pt rgba(0,0,0,0.08);
}
.step-box h3 {
  font-size: 16pt;
  margin: 0 0 8pt 0;
  color: #333333;
}
.step-box ul {
  margin: 0;
  padding-left: 20pt;
  font-size: 13pt;
  color: #555555;
  line-height: 1.6;
}
.step-box li {
  margin-bottom: 5pt;
}
.highlight {
  color: #764ba2;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="header">
  <h1>环节一：原型设计</h1>
</div>
<div class="content">
  <div class="step-box">
    <h3>📋 低保真原型</h3>
    <ul>
      <li>需求分析，确定核心功能模块</li>
      <li>线框图绘制，搭建页面框架</li>
      <li><span class="highlight">交付物：</span>线框图文档、功能清单</li>
    </ul>
  </div>
  <div class="step-box">
    <h3>🎨 高保真交互原型</h3>
    <ul>
      <li>基于线框图添加视觉元素和交互</li>
      <li>实现Tab切换、侧边导航等交互效果</li>
      <li><span class="highlight">交付物：</span>可交互HTML原型文件</li>
    </ul>
  </div>
</div>
</body>
</html>
