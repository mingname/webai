<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #f5f5f5;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #ffffff;
  padding: 20pt 40pt;
}
.header h1 {
  font-size: 28pt;
  margin: 0;
  font-weight: bold;
}
.content {
  padding: 25pt 40pt;
  flex: 1;
}
.tech-stack {
  background: #ffffff;
  padding: 20pt;
  border-radius: 12pt;
  box-shadow: 0 4pt 12pt rgba(0,0,0,0.15);
  margin-bottom: 15pt;
}
.tech-grid {
  display: flex;
  gap: 15pt;
  margin-bottom: 15pt;
}
.tech-item {
  flex: 1;
  background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
  padding: 15pt;
  border-radius: 8pt;
  border: 2pt solid #667eea;
}
.tech-item h3 {
  font-size: 14pt;
  margin: 0 0 8pt 0;
  color: #667eea;
}
.tech-item p {
  font-size: 12pt;
  margin: 0;
  color: #333333;
}
.code-features {
  background: #f8f9fa;
  padding: 15pt;
  border-radius: 8pt;
  border-left: 4pt solid #764ba2;
}
.code-features h3 {
  font-size: 16pt;
  margin: 0 0 10pt 0;
  color: #764ba2;
}
.code-features ul {
  margin: 0;
  padding-left: 20pt;
  font-size: 13pt;
  color: #333333;
  line-height: 1.6;
}
.code-features li {
  margin-bottom: 5pt;
}
</style>
</head>
<body>
<div class="header">
  <h1>环节三：Web代码生成</h1>
</div>
<div class="content">
  <div class="tech-stack">
    <div class="tech-grid">
      <div class="tech-item">
        <h3>🖥️ Vue 3</h3>
        <p>Composition API<br/>响应式框架</p>
      </div>
      <div class="tech-item">
        <h3>⚡ Vite 5</h3>
        <p>快速构建<br/>开发体验优化</p>
      </div>
      <div class="tech-item" style="border-color: #764ba2;">
        <h3>📦 Pinia</h3>
        <p>状态管理<br/>数据持久化</p>
      </div>
      <div class="tech-item" style="border-color: #764ba2;">
        <h3>🛣️ Vue Router</h3>
        <p>路由管理<br/>页面导航</p>
      </div>
    </div>
    <div class="code-features">
      <h3>📁 项目结构</h3>
      <ul>
        <li>src/views/ - 页面组件（登录、首页、注册）</li>
        <li>src/api/ - API接口封装</li>
        <li>src/stores/ - Pinia状态管理</li>
        <li>src/router/ - 路由配置</li>
      </ul>
    </div>
  </div>
</div>
</body>
</html>
